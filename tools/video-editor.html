  <!-- Theme Script -->

  <style>
    /* Tool-specific styles */
    :root {
      --sidebar-width: 220px;
      --properties-width: 280px;
      --timeline-height: 200px;
    }
    
    .editor-layout {
      display: grid;
      grid-template-areas: 
        "sidebar preview properties"
        "timeline timeline timeline";
      grid-template-columns: var(--sidebar-width) 1fr var(--properties-width);
      grid-template-rows: 1fr var(--timeline-height);
      gap: 0;
      height: calc(100vh - 64px);
      width: 100%;
    }

    @media (max-width: 1024px) {
      .editor-layout {
        grid-template-areas: 
          "preview"
          "timeline"
          "properties"
          "sidebar";
        grid-template-columns: 1fr;
        grid-template-rows: 50vh 30vh auto auto;
        height: auto;
      }
    }
    
    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }
    
    /* Resizable panels - Custom implementation */
    .panel-sidebar {
      min-width: 150px;
      /* max-width is handled by resize logic */
    }
    
    .panel-properties {
      min-width: 200px;
    }
    
    .panel-timeline {
      min-height: 120px;
    }
    
    .resizer {
      position: absolute;
      z-index: 50;
      background: transparent;
      transition: background 0.2s;
    }
    .resizer:hover, .resizer.resizing {
      background: var(--accent-primary);
    }

    .resizer-x {
      width: 6px;
      cursor: col-resize;
      top: 0;
      bottom: var(--timeline-height); /* Stops at timeline */
    }
    
    .resizer-y {
      height: 6px;
      cursor: row-resize;
      left: 0;
      right: 0;
      bottom: var(--timeline-height); /* Positioned relative to bottom */
      transform: translateY(50%); /* Center on the line */
    }
    
    #resizer-sidebar { left: var(--sidebar-width); transform: translateX(-50%); }
    #resizer-properties { right: var(--properties-width); transform: translateX(50%); }
    #resizer-timeline { bottom: var(--timeline-height); transform: translateY(50%); width: 100%; top: auto; }

    .panel-header {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      font-size: 0.875rem;
      background: var(--bg-tertiary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .panel-content {
      padding: 0.75rem;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .preview-area {
      grid-area: preview;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      position: relative;
      overflow: hidden;
    }

    .preview-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    .canvas-wrapper {
      position: relative;
      line-height: 0;
      transform-origin: center center;
    }

    canvas#editor-canvas {
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      background: #000;
    }

    /* Fullscreen mode */
    .preview-area:fullscreen,
    .preview-area:-webkit-full-screen {
      background: #000;
    }
    
    .preview-area:fullscreen .canvas-wrapper,
    .preview-area:-webkit-full-screen .canvas-wrapper {
      max-width: 100vw;
      max-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .preview-area:fullscreen canvas#editor-canvas,
    .preview-area:-webkit-full-screen canvas#editor-canvas {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .timeline-area {
      grid-area: timeline;
      display: flex;
      flex-direction: column;
    }

    .track-header {
      width: 150px;
      flex-shrink: 0;
      border-right: 1px solid var(--border-color);
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
    }
    
    /* Input for track rename */
    .track-name-input {
        background: transparent;
        color: inherit;
        border: 1px solid transparent;
        width: 100%;
        font-size: inherit;
    }
    .track-name-input:focus {
        border-color: var(--accent-primary);
        outline: none;
        background: var(--bg-primary);
    }

    .track-lane {
      flex: 1;
      position: relative;
      height: 40px; /* match header height roughly */
      background: var(--bg-primary);
    }

    .clip-handle {
        position: absolute;
        width: 6px;
        top: 0;
        bottom: 0;
        background: rgba(255,255,255,0.3);
        cursor: ew-resize;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.2s;
    }
    .timeline-clip:hover .clip-handle { opacity: 1; }
    .clip-handle.handle-left { left: 0; }
    .clip-handle.handle-right { right: 0; }
    
    .timeline-clip {
        position: absolute;
        height: 100%;
        background: var(--accent-primary);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 4px;
        overflow: hidden;
        font-size: 0.75rem;
        padding: 0 8px;
        white-space: nowrap;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        user-select: none;
    }

    .timeline-clip.selected {
        border: 2px solid #fff;
        z-index: 5;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    
    .timeline-clip.type-audio { background: #8b5cf6; } 
    .timeline-clip.type-text { background: #ec4899; }
    .timeline-clip.type-video { background: #3b82f6; }

    .timeline-wrapper {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .timeline-header {
      display: flex;
      height: 30px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .timeline-header-side {
      width: 150px;
      flex-shrink: 0;
      border-right: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      z-index: 20;
    }

    .timeline-ruler-container {
      flex: 1;
      overflow: hidden; /* Synced scroll */
      position: relative;
    }

    .timeline-ruler {
      height: 100%;
      position: relative;
      background: linear-gradient(90deg, transparent 99px, var(--border-color) 100px);
      background-size: 100px 100%; /* Tick marks roughly */
      cursor: pointer;
    }

    .timeline-body {
      flex: 1;
      overflow: auto; /* Main scrollbar */
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .track-container {
      display: flex;
      height: 60px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .track-header {
      width: 150px;
      flex-shrink: 0;
      border-right: 1px solid var(--border-color);
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-tertiary);
      position: sticky;
      left: 0;
      z-index: 10;
    }

    .track-lane {
      flex-shrink: 0; /* Don't shrink, rely on width */
      position: relative;
      background: var(--bg-primary);
      min-width: 100%; /* At least full width */
    }

    .playhead {
      position: absolute;
      top: 0;
      width: 2px;
      background: #ef4444;
      z-index: 50;
      pointer-events: none;
      height: 100%;
    }
    
    .playhead::before {
      content: '';
      position: absolute;
      top: 0;
      left: -5px;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid #ef4444;
    }

    /* Canvas Interactions */
    .interaction-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    
    .gizmo-box {
      position: absolute;
      border: 2px solid var(--accent-primary);
      pointer-events: all;
      cursor: grab;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.5);
    }
    .gizmo-box:active { cursor: grabbing; }

    .gizmo-handle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border: 1px solid var(--accent-primary);
      border-radius: 50%;
      pointer-events: all;
    }
    .handle-tl { top: -5px; left: -5px; cursor: nwse-resize; }
    .handle-tr { top: -5px; right: -5px; cursor: nesw-resize; }
    .handle-bl { bottom: -5px; left: -5px; cursor: nesw-resize; }
    .handle-br { bottom: -5px; right: -5px; cursor: nwse-resize; }
    .handle-rot { top: -25px; left: 50%; transform: translateX(-50%); cursor: grab; }


  </style>
</head>
<body class="min-h-screen flex flex-col">
  
  <!-- Header -->
  <header id="header" class="header fixed top-0 left-0 right-0 z-40 transition-shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        
        <!-- Logo -->
        <a href="../index.html" class="flex items-center gap-2">
          <span class="text-2xl">⚡</span>
          <span class="text-xl font-bold gradient-text">WithoutAccount</span>
        </a>
        
        <!-- Breadcrumb -->
        <nav class="hidden md:flex items-center gap-2 text-sm">
          <a href="../index.html" class="text-[var(--text-secondary)] hover:text-[var(--text-primary)]">Home</a>
          <span class="text-[var(--text-muted)]">/</span>
          <a href="../index.html#tools" class="text-[var(--text-secondary)] hover:text-[var(--text-primary)]">Tools</a>
          <span class="text-[var(--text-muted)]">/</span>
          <span class="text-[var(--accent-primary)]">Video Editor</span>
        </nav>
        
        <!-- Theme Toggle -->
        <button data-theme-toggle class="theme-toggle" aria-label="Toggle theme">
          <svg id="theme-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg id="theme-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="pt-16 pb-2 flex-1 px-2 overflow-hidden">
    <div class="editor-layout" id="editor-layout">
        <!-- Resizers -->
        <div id="resizer-sidebar" class="resizer resizer-x"></div>
        <div id="resizer-properties" class="resizer resizer-x"></div>
        <div id="resizer-timeline" class="resizer resizer-y"></div>
        
        <!-- Sidebar: Assets & Layers -->
        <div class="panel panel-sidebar" style="grid-area: sidebar;">
            <div class="panel-header">
                Assets
                <label for="file-upload" class="cursor-pointer text-[var(--accent-primary)] hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </label>
                <input type="file" id="file-upload" class="hidden" multiple accept="video/*,image/*,audio/*">
            </div>
            <div class="panel-content" id="assets-list">
                <!-- Drop zone and list -->
                <div class="text-center p-4 border-2 border-dashed border-[var(--border-color)] rounded-lg text-sm text-[var(--text-muted)]">
                    Drop files here or click +
                </div>
                
                <div class="mt-4 space-y-2">
                    <button id="add-text-btn" class="w-full py-2 bg-[var(--bg-tertiary)] hover:bg-[var(--accent-primary)] rounded transition-colors text-sm">Add Text</button>
                </div>
            </div>
        </div>

        <!-- Preview Area -->
        <div class="panel preview-area" id="preview-panel">
            <!-- Top bar with settings -->
            <div class="absolute top-2 left-2 z-20 flex gap-2 items-center">
                <select id="resolution-select" class="bg-black/50 text-white text-xs px-2 py-1 rounded border border-white/20 backdrop-blur">
                    <option value="1920x1080">1920×1080 (16:9)</option>
                    <option value="1280x720" selected>1280×720 (16:9)</option>
                    <option value="854x480">854×480 (16:9)</option>
                    <option value="1080x1920">1080×1920 (9:16)</option>
                    <option value="1080x1080">1080×1080 (1:1)</option>
                    <option value="2560x1440">2560×1440 (16:9)</option>
                    <option value="3840x2160">3840×2160 (4K)</option>
                    <option value="custom">Custom...</option>
                </select>
                <span id="preview-zoom-label" class="text-white/60 text-xs">100%</span>
            </div>
            
            <div class="absolute top-2 right-2 z-20 flex gap-2">
                <button id="btn-zoom-preview-out" class="bg-black/50 text-white text-xs px-2 py-1 rounded border border-white/20 backdrop-blur hover:bg-white/20">−</button>
                <button id="btn-zoom-preview-fit" class="bg-black/50 text-white text-xs px-2 py-1 rounded border border-white/20 backdrop-blur hover:bg-white/20">Fit</button>
                <button id="btn-zoom-preview-in" class="bg-black/50 text-white text-xs px-2 py-1 rounded border border-white/20 backdrop-blur hover:bg-white/20">+</button>
                <button id="btn-export" class="bg-green-600 hover:bg-green-700 text-white text-xs px-3 py-1 rounded shadow font-medium flex items-center gap-1" onclick="umami.track('Video Editor: Export Click')">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export
                </button>
            </div>

            <!-- Canvas container -->
            <div class="preview-container" id="preview-container">
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <canvas id="editor-canvas" width="1280" height="720"></canvas>
                    <div id="interaction-overlay" class="interaction-overlay"></div>
                </div>
            </div>
            
            <!-- Bottom controls -->
            <div class="absolute bottom-3 left-0 right-0 flex justify-center gap-3 z-20">
                <button id="btn-prev-frame" class="bg-black/50 text-white p-2 rounded-full border border-white/20 backdrop-blur hover:bg-white/20"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg></button>
                <button id="btn-play" class="bg-black/50 text-white p-2 rounded-full border border-white/20 backdrop-blur hover:bg-white/20"><svg id="icon-play" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>
                <button id="btn-next-frame" class="bg-black/50 text-white p-2 rounded-full border border-white/20 backdrop-blur hover:bg-white/20"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg></button>
                <button id="btn-fullscreen" class="bg-black/50 text-white p-2 rounded-full border border-white/20 backdrop-blur hover:bg-white/20"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
            </div>
        </div>

        <!-- Properties Panel -->
        <div class="panel panel-properties" style="grid-area: properties;">
            <div class="panel-header">Properties</div>
            <div class="panel-content" id="properties-content">
                <div class="text-[var(--text-muted)] text-center text-sm mt-4">No clip selected</div>
                <!-- Dynamic content will go here -->
            </div>
        </div>

        <!-- Timeline Area -->
        <div class="panel panel-timeline timeline-area">
            <div class="panel-header flex justify-between flex-shrink-0">
                <div>Timeline</div>
                <div class="flex gap-2 text-xs">
                     <button id="btn-add-track" class="px-2 py-1 bg-[var(--bg-primary)] rounded border border-[var(--border-color)] hover:border-[var(--accent-primary)]">Add Track</button>
                     <button id="btn-zoom-in" class="px-2 py-1 bg-[var(--bg-primary)] rounded border border-[var(--border-color)]" title="Zoom In">+</button>
                     <button id="btn-zoom-out" class="px-2 py-1 bg-[var(--bg-primary)] rounded border border-[var(--border-color)]" title="Zoom Out">-</button>
                     <button id="btn-split" class="px-2 py-1 bg-[var(--bg-primary)] rounded border border-[var(--border-color)]" title="Split clip at playhead" onclick="umami.track('Video Editor: Split Clip Click')">Split (S)</button>
                     <button id="btn-delete" class="px-2 py-1 bg-red-900/50 rounded border border-red-900 text-red-200" title="Delete selected clip">Del</button>
                </div>
            </div>
            
            <div class="timeline-wrapper">
                <!-- Playhead spans the entire timeline area -->
                <div id="playhead" class="playhead" style="left: 150px;"></div>
                
                <div class="timeline-header">
                    <div class="timeline-ruler-container" id="timeline-ruler-container">
                        <div class="timeline-ruler" id="timeline-ruler"></div>
                    </div>
                </div>

                <div class="timeline-body" id="timeline-scroll-area">
                    <div class="flex-col relative" id="timeline-tracks">
                        <!-- Tracks generated by JS -->
                    </div>
                </div>
            </div>
        </div>

    </div>
    <!-- Rendering Modal -->
    <div id="rendering-modal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center hidden">
        <div class="bg-[var(--bg-secondary)] p-6 rounded-xl border border-[var(--border-color)] max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-center">Exporting Video...</h3>
            
            <div class="w-full bg-[var(--bg-tertiary)] rounded-full h-4 mb-4 overflow-hidden">
                <div id="render-progress" class="bg-[var(--accent-primary)] h-full transition-all duration-100" style="width: 0%"></div>
            </div>
            
            <p class="text-[var(--text-secondary)] text-center text-sm mb-6">
                Please do not close this tab. Processing...
            </p>
            
            <button id="btn-cancel-export" class="w-full py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors">
                Cancel
            </button>
        </div>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/video-editor.js"></script>
</body>
</html>
